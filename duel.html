<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GambaPay - Duel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/duel.css">
</head>
<body>
    <header>
    <nav class="navbar">
        <div class="logo">GambaPay</div>
        <ul class="nav-links">
             <li><a href="index.html">Home</a></li>
            <li><a href="app.html">Play</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li><a href="yui.html">Beat Yui</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
    </nav>
    </header>

    <main>

        <section id="faceoff">
            <div class="player-card left">
                <div class="player-avatar"></div>
                <div class="player-name">You</div>
            </div>

            <div id="faceoff-center">
                <div class="vs-divider">
                    <h1>Vs</h1>
                </div>
                <button class="btn-ready">READY??</button>
            </div>

             <div id="inline-countdown" class="hidden">
                <div class="countdown-number">3</div>
             </div>

             <div class="player-card right">
                <div class="player-avatar"></div>
                <div class="player-name">Opponent</div>
            </div>
</section>

        <section id="countdown" class="hidden">
            <div class="countdown-number">3</div>
        </section>

        <section id="wheel-stage" class="hidden">

            <div class="slice-picker">
                <button class="btn-slices active" id="slices-8">8 Slices</button>
                <button class="btn-slices" id="slices-16">16 Slices</button>
            </div>

            <div class="wheel-container">
                <div class="pizza-wheel" id="pizza-wheel">
                </div>
                <div class="wheel-pointer">▼</div>
            </div>

            <button class="btn-spin" id="btn-spin">SPIN!!</button>

            <div class="player-labels">
                <div class="label-left">You</div>
                <div class="label-right">Opponent</div>
            </div>

            <div class="result-screen hidden" id="result-screen">
                <h2 class="result-message">Winner!!</h2>
                <div class="amount-display">You pay: $0.00</div>
                <div id="yui-duel-quote" class="hidden"></div>
                <button class="btn-confirm hidden">Confirm Payment</button>
                <button class="btn-play-again hidden">Play Again</button>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div class="footer-container">
            <div class="footer-brand">GambaPay</div>
            <p class="footer-credit">Built by James Martin J. Biñas</p>
        </div>
    </footer>

    <script src="js/global.js"></script>
    <script src="js/duel.js"></script>
</body>
</html>
